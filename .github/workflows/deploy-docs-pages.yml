name: Deploy docs-site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install docs-site dependencies
        run: npm --prefix docs-site ci

      - name: Build library assets
        run: npm run build

      - name: Build docs-site for GitHub Pages
        working-directory: docs-site
        env:
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
        run: |
          npx nuxt build --preset github_pages
          echo "Nuxt build finished."

      - name: Debug generated output
        run: |
          ls -la docs-site
          ls -la docs-site/.output || true
          ls -la docs-site/.output/public || true
          ls -la .output || true
          ls -la docs-site/node_modules/.cache || true
          ls -la docs-site/node_modules/.cache/nuxt || true
          ls -la docs-site/node_modules/.cache/nuxt/.output || true
          ls -la docs-site/node_modules/.cache/nuxt/.output/public || true

      - name: Prepare pages artifact
        run: |
          set -euo pipefail
          rm -rf .pages-artifact

          OUTPUT_DIR=""

          if [ -d docs-site/.output/public ]; then
            OUTPUT_DIR="docs-site/.output/public"
          elif [ -d .output/public ]; then
            OUTPUT_DIR=".output/public"
          elif [ -d docs-site/dist ]; then
            OUTPUT_DIR="docs-site/dist"
          elif [ -d docs-site/node_modules/.cache/nuxt/.output/public ]; then
            OUTPUT_DIR="docs-site/node_modules/.cache/nuxt/.output/public"
          fi

          if [ -z "${OUTPUT_DIR}" ]; then
            OUTPUT_DIR="$(find . -type f -path '*/.output/public/index.html' -print -quit | xargs -r dirname || true)"
          fi

          if [ -z "${OUTPUT_DIR}" ]; then
            echo "ERROR: no static output folder found."
            echo "Expected docs-site/.output/public, .output/public, docs-site/dist or cache output"
            find . -maxdepth 6 -type d -name '.output' | sed -n '1,120p' || true
            find . -maxdepth 6 -type f -name 'index.html' | sed -n '1,120p' || true
            ls -la docs-site
            ls -la . || true
            exit 2
          fi

          echo "Using output directory: ${OUTPUT_DIR}"
          cp -R "${OUTPUT_DIR}" .pages-artifact

          if [ ! -f .pages-artifact/index.html ]; then
            echo "ERROR: .pages-artifact/index.html not found."
            find .pages-artifact -maxdepth 2 -type f | head -n 100
            exit 2
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages-artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
