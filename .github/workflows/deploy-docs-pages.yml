name: Deploy docs-site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install docs-site dependencies
        run: npm --prefix docs-site ci

      - name: Build library assets
        run: npm run build

      - name: Generate docs-site and prepare artifact
        working-directory: docs-site
        env:
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
        run: |
          set -euo pipefail
          npm run generate

          if [ ! -d .output/public ]; then
            echo "ERROR: docs-site/.output/public not found after generate."
            pwd
            ls -la
            find . -maxdepth 8 -type f -name 'index.html' | sed -n '1,120p' || true
            exit 2
          fi

          rm -rf "${GITHUB_WORKSPACE}/.pages-artifact"
          cp -R .output/public "${GITHUB_WORKSPACE}/.pages-artifact"

          if [ ! -f "${GITHUB_WORKSPACE}/.pages-artifact/index.html" ]; then
            echo "ERROR: .pages-artifact/index.html not found."
            find "${GITHUB_WORKSPACE}/.pages-artifact" -maxdepth 2 -type f | head -n 100
            exit 2
          fi

          ls -la "${GITHUB_WORKSPACE}/.pages-artifact" | sed -n '1,80p'

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages-artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
