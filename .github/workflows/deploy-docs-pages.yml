name: Deploy docs-site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install docs-site dependencies
        run: npm --prefix docs-site ci

      - name: Build library and docs-site
        env:
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build:docs

      - name: Prepare pages artifact
        run: |
          set -euo pipefail
          rm -rf .pages-artifact

          if [ -d docs-site/.output/public ]; then
            cp -R docs-site/.output/public .pages-artifact
          elif [ -d docs-site/dist ]; then
            cp -R docs-site/dist .pages-artifact
          else
            echo "ERROR: no static output folder found."
            echo "Expected docs-site/.output/public or docs-site/dist"
            ls -la docs-site
            exit 2
          fi

          if [ ! -f .pages-artifact/index.html ]; then
            echo "ERROR: .pages-artifact/index.html not found."
            find .pages-artifact -maxdepth 2 -type f | head -n 100
            exit 2
          fi

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages-artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
